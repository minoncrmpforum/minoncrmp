<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <style>
        /* Здесь остается твой оригинальный CSS, я поменял только наполнение блоков */
        body { margin: 0; padding: 0; font-family: sans-serif; background: #111; color: #fff; }
        .header { display: flex; justify-content: space-between; padding: 20px 50px; background: rgba(0,0,0,0.5); }
        .hero { text-align: center; padding: 100px 20px; }
        .btn-main { background: #ff4500; color: #fff; padding: 15px 40px; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; }
        .social-icons { display: flex; gap: 20px; justify-content: center; margin-top: 50px; }
        .social-icons a { color: #555; text-decoration: none; border: 1px solid #333; padding: 10px 20px; }
        /* Убрал стили форума и айпи-мониторинга */
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">M-PROJECT</div>
        <nav>
            <a href="https://t.me/arz_radmir" style="color:#fff; margin-right:20px; text-decoration:none;">НАШ КАНАЛ</a>
        </nav>
    </header>

    <main class="hero">
        <h1>СЛЕДИ ЗА ОБНОВЛЕНИЯМИ</h1>
        <p>Заходи в наш ТГК, чтобы ничего не пропустить</p>
        <br><br>
        <a href="https://t.me/arz_radmir" class="btn-main">ПЕРЕЙТИ В ТЕЛЕГРАМ</a>
        
        <div style="margin-top: 30px;">
            <button onclick="location.href='https://t.me/arz_radmir'" class="btn-main" style="background: #24A1DE;">КУПИТЬ</button>
            <button onclick="location.href='https://t.me/arz_radmir'" class="btn-main" style="background: #24A1DE; margin-left: 10px;">ДОНАТ</button>
        </div>
    </main>

    <footer class="social-icons">
        <a href="https://t.me/arz_radmir">TELEGRAM</a>
        <a href="">VK</a>
        <a href="">DISCORD</a>
        <a href="">YOUTUBE</a>
    </footer>

    <script>
        // Скрипт-страховка: все ссылки на оплату или форум перехватываются
        document.addEventListener('click', function(e) {
            const target = e.target;
            if (target.innerText.toLowerCase().includes('донат') || 
                target.innerText.toLowerCase().includes('купить') ||
                target.innerText.toLowerCase().includes('форум')) {
                e.preventDefault();
                window.location.href = 'https://t.me/arz_radmir';
            }
        });
    </script>
</body>
</html>
