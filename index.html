<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Name - TG Community</title>
    <style>
        :root {
            --main-color: #24A1DE; /* Цвет Telegram */
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-tg {
            background-color: var(--main-color);
            color: white;
            font-size: 1.2rem;
        }

        .btn-tg:hover { background-color: #1e87bb; transform: scale(1.05); }

        .btn-action {
            background-color: #ffffff;
            color: #000;
        }

        .btn-action:hover { background-color: #ddd; }

        .social-grid {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .social-link {
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
            color: #777;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ДОБРО ПОЖАЛОВАТЬ</h1>
        <p>Вся жизнь проекта, новости и общение происходят в нашем официальном канале.</p>

        <a href="https://t.me/arz_radmir" class="btn btn-tg">ПОДПИСАТЬСЯ НА ТГК</a>

        <div class="actions">
            <a href="https://t.me/arz_radmir" class="btn btn-action">КУПИТЬ ТОВАРЫ</a>
            <a href="https://t.me/arz_radmir" class="btn btn-action">ДОНАТ</a>
        </div>

        <div class="social-grid">
            <a href="#" class="social-link">VK</a>
            <a href="#" class="social-link">DISCORD</a>
            <a href="#" class="social-link">YOUTUBE</a>
        </div>
    </div>

    <script>
        // Дополнительная мера: если где-то в коде остались старые обработчики, 
        // этот скрипт перенаправит нажатия кнопок покупки на ТГ
        document.querySelectorAll('.buy-btn, .donate-btn').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = 'https://t.me/arz_radmir';
            });
        });
    </script>

</body>
</html>
